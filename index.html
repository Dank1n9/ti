<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初二语文 · 古诗文名句默写</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #ffffff;
            font-family: 'SimSun', 'Times New Roman', '宋体', serif;
            color: #000000;
            padding: 30px 20px 50px;
            display: flex;
            justify-content: center;
        }

        .paper {
            max-width: 880px;
            width: 100%;
            background: #ffffff;
            padding: 20px 30px 40px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #000000;
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        .header .sub {
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            margin-top: 6px;
            font-weight: 500;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header .sub span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .header .sub .line {
            display: inline-block;
            width: 120px;
            border-bottom: 1px solid #000;
            margin-left: 6px;
            height: 1em;
        }

        .name-input, .class-input {
            border: none;
            border-bottom: 1px solid #000;
            background: transparent;
            font-family: inherit;
            font-size: 15px;
            width: 120px;
            padding: 2px 4px;
            outline: none;
            color: #000;
        }
        .name-input:focus, .class-input:focus {
            border-bottom-color: #333;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 6px 12px 6px;
            border-bottom: 1px dashed #999;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .score-board .right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn-reset {
            background: #fff;
            border: 1px solid #333;
            padding: 4px 18px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            color: #000;
            transition: 0.15s;
        }
        .btn-reset:hover {
            background: #f0f0f0;
        }

        .question-item {
            margin-bottom: 18px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }

        .q-line {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 4px 2px;
            font-size: 17px;
            line-height: 2.0;
        }

        .q-number {
            font-weight: 700;
            margin-right: 6px;
            min-width: 34px;
        }

        .q-text {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 2px 0;
        }

        .q-text .part {
            white-space: nowrap;
        }

        .q-text input {
            font-family: inherit;
            font-size: 17px;
            border: none;
            border-bottom: 1.5px solid #000000;
            background: transparent;
            outline: none;
            width: 130px;
            padding: 0 4px 2px 4px;
            color: #000;
            font-weight: 500;
            min-width: 90px;
            transition: border-color 0.15s;
            border-radius: 0;
        }

        .q-text input:focus {
            border-bottom-color: #333;
        }

        .q-text input.correct {
            border-bottom-color: #1a7a3a;
            background: #f2faf5;
        }

        .q-text input.wrong {
            border-bottom-color: #b91c1c;
            background: #fdf2f2;
        }

        .q-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 18px;
            margin-top: 4px;
            margin-left: 40px;
        }

        .q-actions button {
            background: #ffffff;
            border: 1px solid #666;
            padding: 2px 18px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            color: #000;
            transition: 0.12s;
            border-radius: 0;
        }

        .q-actions button:hover {
            background: #f2f2f2;
        }

        .q-actions .hint-btn {
            border-color: #888;
            color: #222;
        }

        .feedback {
            margin-left: 40px;
            font-size: 14px;
            min-height: 24px;
            padding-top: 2px;
            color: #000;
        }

        .feedback .correct-msg {
            color: #1a7a3a;
            font-weight: 600;
        }

        .feedback .wrong-msg {
            color: #b91c1c;
            font-weight: 600;
        }

        .feedback .answer-hint {
            color: #333;
        }

        .hint-box {
            margin-left: 40px;
            margin-top: 4px;
            padding: 4px 12px;
            background: #f8f8f8;
            border-left: 4px solid #888;
            font-size: 14px;
            color: #1a1a1a;
            display: none;
            border-radius: 0;
        }

        .hint-box.show {
            display: block;
        }

        #reportArea {
            margin-top: 24px;
            border-top: 2px solid #000;
            padding-top: 18px;
            display: none;
        }
        #reportArea h2 {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 12px;
        }
        .report-summary {
            display: flex;
            justify-content: space-around;
            font-size: 17px;
            padding: 8px 0;
            border-bottom: 1px solid #ccc;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .report-summary span {
            font-weight: 500;
        }
        .report-wrong-list {
            list-style: none;
            padding: 0;
        }
        .report-wrong-list li {
            padding: 6px 0 10px 0;
            border-bottom: 1px dashed #ddd;
            font-size: 15px;
            line-height: 1.8;
        }
        .report-wrong-list .wrong-q {
            font-weight: 600;
        }
        .report-wrong-list .your-ans {
            color: #b91c1c;
        }
        .report-wrong-list .correct-ans {
            color: #1a7a3a;
        }
        .report-empty {
            text-align: center;
            font-size: 18px;
            padding: 20px 0;
        }

        @media (max-width: 600px) {
            .paper {
                padding: 12px 12px 30px;
            }
            .q-line {
                font-size: 15px;
                line-height: 1.9;
            }
            .q-text input {
                font-size: 15px;
                width: 90px;
                min-width: 70px;
            }
            .q-actions {
                margin-left: 0;
                gap: 8px;
            }
            .feedback, .hint-box {
                margin-left: 0;
            }
            .header .sub {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            .score-board {
                flex-direction: column;
                align-items: stretch;
            }
            .name-input, .class-input {
                width: 100px;
            }
        }
    </style>
</head>
<body>
<div class="paper">
    <div class="header">
        <h1>2026 年 南 京 市 初 二 语 文</h1>
        <div style="font-size:22px; font-weight:700; letter-spacing: 6px; margin-top: -2px;">古诗文名句默写（八年级下册）</div>

    <div class="score-board">

    <div id="questionsContainer"></div>

</div>

            { template: '###，禅房花木深。', answer: '曲径通幽处', hint: '常建《题破山寺后禅院》' },
            // 《送友人》更多
            { template: '###，落日故人情。', answer: '浮云游子意', hint: '李白《送友人》' },
            // 《卜算子·咏梅》更多
            { template: '###，只有香如故。', answer: '零落成泥碾作尘', hint: '陆游《卜算子·咏梅》' },
            // ---- 八下其他高频句 ----
            { template: '###，在城阙兮。', answer: '挑兮达兮', hint: '《诗经·子衿》' },
            { template: '###，天下为公。', answer: '大道之行也', hint: '《大道之行也》' },
            { template: '###，骈死于槽枥之间。', answer: '祗辱于奴隶人之手', hint: '韩愈《马说》' },
            { template: '###，鸣之而不能通其意。', answer: '食之不能尽其材', hint: '韩愈《马说》' },
            { template: '###，儿女共沾巾。', answer: '无为在歧路', hint: '王勃《送杜少府之任蜀州》' },
            { template: '###，徒有羡鱼情。', answer: '坐观垂钓者', hint: '孟浩然《望洞庭湖赠张丞相》' },
            { template: '###，潭影空人心。', answer: '山光悦鸟性', hint: '常建《题破山寺后禅院》' },
            { template: '###，萧萧班马鸣。', answer: '挥手自兹去', hint: '李白《送友人》' },
            { template: '###，缥缈孤鸿影。', answer: '谁见幽人独往来', hint: '苏轼《卜算子》' },
            { template: '###，寂寞开无主。', answer: '驿外断桥边', hint: '陆游《卜算子·咏梅》' },
            { template: '###，更著风和雨。', answer: '已是黄昏独自愁', hint: '陆游《卜算子·咏梅》' },
            // ---- 继续补充至100题 ----
            { template: '###，弗食，不知其旨也。', answer: '虽有嘉肴', hint: '《虽有嘉肴》' },
            { template: '###，弗学，不知其善也。', answer: '虽有至道', hint: '《虽有嘉肴》' },
            { template: '###，选贤与能，讲信修睦。', answer: '故人不独亲其亲', hint: '《大道之行也》' },
            { template: '###，教学相长也。', answer: '故曰', hint: '《虽有嘉肴》' },
            { template: '###，长夜沾湿何由彻！', answer: '自经丧乱少睡眠', hint: '杜甫《茅屋为秋风所破歌》' },
            { template: '###，系向牛头充炭直。', answer: '半匹红纱一丈绫', hint: '白居易《卖炭翁》' },
            { template: '###，不知其几千里也。', answer: '鹏之背', hint: '庄子《北冥有鱼》' },
            { template: '###，去以六月息者也。', answer: '抟扶摇而上者九万里', hint: '庄子《北冥有鱼》' },
            { template: '###，在河之洲。', answer: '关关雎鸠', hint: '《诗经·关雎》' },
            { template: '###，白露未晞。', answer: '蒹葭萋萋', hint: '《诗经·蒹葭》' },
            { template: '###，在水之湄。', answer: '所谓伊人', hint: '《诗经·蒹葭》' },
            { template: '###，胡为乎泥中？', answer: '微君之躬', hint: '《诗经·式微》' },
            { template: '###，子宁不嗣音？', answer: '纵我不往', hint: '《诗经·子衿》' },
            { template: '###，大庇天下寒士俱欢颜！', answer: '安得广厦千万间', hint: '杜甫《茅屋为秋风所破歌》' }
        ];

        // 确保正好100题（截取前100）
        const finalQuestions = questions.slice(0, 100);

        let states = new Array(finalQuestions.length).fill('idle');
        let score = 0;
        const container = document.getElementById('questionsContainer');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const scoreDisplay2 = document.getElementById('scoreDisplay2');
        const totalDisplay = document.getElementById('totalDisplay');
        const totalDisplay2 = document.getElementById('totalDisplay2');

        function render() {
            container.innerHTML = '';
            finalQuestions.forEach((q, index) => {
                const parts = q.template.split('###');
                const before = parts[0] || '';
                const after = parts[1] || '';

                const item = document.createElement('div');
                item.className = 'question-item';
                item.dataset.index = index;

                const line = document.createElement('div');
                line.className = 'q-line';

                const numSpan = document.createElement('span');
                numSpan.className = 'q-number';
                numSpan.textContent = `${index + 1}.`;
                line.appendChild(numSpan);

                const textSpan = document.createElement('span');
                textSpan.className = 'q-text';

                const beforeSpan = document.createElement('span');
                beforeSpan.className = 'part';
                beforeSpan.textContent = before;
                textSpan.appendChild(beforeSpan);

                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = '';
                input.autocomplete = 'off';
                input.dataset.index = index;
                textSpan.appendChild(input);

                const afterSpan = document.createElement('span');
                afterSpan.className = 'part';
                afterSpan.textContent = after;
                textSpan.appendChild(afterSpan);

                line.appendChild(textSpan);
                item.appendChild(line);

                const actions = document.createElement('div');
                actions.className = 'q-actions';

                const checkBtn = document.createElement('button');
                checkBtn.textContent = '检查';
                checkBtn.className = 'check-btn';
                checkBtn.dataset.index = index;

                const hintBtn = document.createElement('button');
                hintBtn.textContent = '提示';
                hintBtn.className = 'hint-btn';
                hintBtn.dataset.index = index;

                actions.appendChild(checkBtn);
                actions.appendChild(hintBtn);
                item.appendChild(actions);

                const feedback = document.createElement('div');
                feedback.className = 'feedback';
                feedback.id = `fb-${index}`;
                item.appendChild(feedback);

                const hintBox = document.createElement('div');
                hintBox.className = 'hint-box';
                hintBox.id = `hint-${index}`;
                hintBox.textContent = q.hint;
                item.appendChild(hintBox);

                container.appendChild(item);

                checkBtn.addEventListener('click', function(e) {
                    const idx = parseInt(this.dataset.index);
                    checkQuestion(idx);
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        const idx = parseInt(this.dataset.index);
                        checkQuestion(idx);
                    }
                });

                input.addEventListener('input', function() {
                    const idx = parseInt(this.dataset.index);
                    if (states[idx] === 'correct' || states[idx] === 'wrong') {
                        states[idx] = 'idle';
                        this.classList.remove('correct', 'wrong');
                        const fb = document.getElementById(`fb-${idx}`);
                        if (fb) fb.innerHTML = '';
                        updateScore();
                    }
                });

                hintBtn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    const box = document.getElementById(`hint-${idx}`);
                    if (box) {
                        box.classList.toggle('show');
                    }
                });
            });

            totalDisplay.textContent = finalQuestions.length;
            totalDisplay2.textContent = finalQuestions.length;
            updateScore();
        }

        function checkQuestion(index) {
            const item = document.querySelector(`.question-item[data-index="${index}"]`);
            if (!item) return;
            const input = item.querySelector('input');
            const feedback = document.getElementById(`fb-${index}`);
            if (!input || !feedback) return;

            const user = input.value.trim();
            const correct = finalQuestions[index].answer;

            input.classList.remove('correct', 'wrong');

            if (user === '') {
                feedback.innerHTML = '<span style="color:#8b0000;">请先填写答案</span>';
                return;
            }

            if (user === correct) {
                states[index] = 'correct';
                input.classList.add('correct');
                feedback.innerHTML = '<span class="correct-msg">正确</span>';
            } else {
                states[index] = 'wrong';
                input.classList.add('wrong');
                feedback.innerHTML = `<span class="wrong-msg">错误</span> <span class="answer-hint">（正确答案：<strong>${correct}</strong>）</span>`;
            }
            updateScore();
        }

        function updateScore() {
            let correctCount = 0;
            states.forEach(s => { if (s === 'correct') correctCount++; });
            score = correctCount;
            scoreDisplay.textContent = score;
            scoreDisplay2.textContent = score;
        }

        function resetAll() {
            states.fill('idle');
            const inputs = document.querySelectorAll('.question-item input');
            inputs.forEach(inp => {
                inp.value = '';
                inp.classList.remove('correct', 'wrong');
            });
            const fbs = document.querySelectorAll('.feedback');
            fbs.forEach(fb => fb.innerHTML = '');
            const hints = document.querySelectorAll('.hint-box');
            hints.forEach(h => h.classList.remove('show'));
            document.getElementById('reportArea').style.display = 'none';
            updateScore();
        }

        function generateReport() {
            const reportArea = document.getElementById('reportArea');
            const reportContent = document.getElementById('reportContent');

            const name = document.querySelector('.name-input').value.trim() || '未填写';
            const cls = document.querySelector('.class-input').value.trim() || '未填写';

            let correctCount = 0;
            let wrongList = [];

            const inputs = document.querySelectorAll('.question-item input');
            inputs.forEach((input, idx) => {
                const user = input.value.trim();
                const correct = finalQuestions[idx].answer;
                const parts = finalQuestions[idx].template.split('###');
                const displayAns = user || '____';
                const fullQ = parts[0] + displayAns + parts[1];

                if (user === correct) {
                    correctCount++;
                } else {
                    wrongList.push({
                        index: idx,
                        userAns: user || '(未作答)',
                        correctAns: correct,
                        fullQuestion: fullQ
                    });
                }
            });

            const total = finalQuestions.length;
            const wrongCount = wrongList.length;
            const accuracy = total === 0 ? 0 : Math.round((correctCount / total) * 100);

            let html = `<div class="report-summary">
                <span>姓名：${name}</span>
                <span>班级：${cls}</span>
                <span>总题数：${total}</span>
                <span>正确：${correctCount}</span>
                <span>错误：${wrongCount}</span>
                <span>正确率：${accuracy}%</span>
            </div>`;

            if (wrongList.length === 0) {
                html += `<div class="report-empty">全部正确，非常棒！</div>`;
            } else {
                html += `<div style="font-weight:700;font-size:17px;margin-bottom:8px;">错题汇总：</div><ul class="report-wrong-list">`;
                wrongList.forEach(item => {
                    html += `<li>
                        <span class="wrong-q">${item.index+1}. ${item.fullQuestion}</span><br>
                        <span>你的答案：<span class="your-ans">${item.userAns}</span></span>
                        <span style="margin-left:20px;">正确答案：<span class="correct-ans">${item.correctAns}</span></span>
                    </li>`;
                });
                html += `</ul>`;
            }

            reportContent.innerHTML = html;
            reportArea.style.display = 'block';
        }

        render();
        document.getElementById('resetBtn').addEventListener('click', resetAll);
        document.getElementById('reportBtn').addEventListener('click', generateReport);
    })();
</script>
</body>
</html>
